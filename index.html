<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tier List Pro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1>Tier List Pro</h1>
          <p class="subtitle">高级层级划分工具 · Smooth, tactile and visual-first.</p>
        </div>
        <div class="toolbar">
          <button id="add-tier" class="btn">+ 新增等级</button>
          <button id="reorder-tiers" class="btn">一键重排</button>
          <button id="reset-board" class="btn">重置</button>
          <button id="contact-author" class="btn">联系作者</button>
          <label for="upload" class="btn primary">上传图片</label>
          <input id="upload" type="file" accept="image/*" multiple hidden />
        </div>
      </header>

      <section id="board" class="board"></section>

      <section id="asset-pool" class="asset-pool">
        <div class="pool-header">
          <h2>素材库</h2>
          <p>支持点击上传或拖拽本地图片到此区域</p>
        </div>
        <div id="pool-grid" class="items-grid"></div>
      </section>
    </main>

    <dialog id="author-modal" class="author-modal">
      <div class="modal-content">
        <h3>请作者喝杯奶茶 🧋</h3>
        <p>感谢支持！可通过微信联系作者：</p>
        <p class="wechat">微信号：<strong>cvsooo</strong></p>
        <div class="modal-actions">
          <button id="copy-wechat" class="btn">复制微信号</button>
          <button id="close-modal" class="btn primary">我知道了</button>
        </div>
      </div>
    </dialog>

    <template id="tier-template">
      <article class="tier-row" draggable="true">
        <div class="tier-label-wrap">
          <button class="row-handle" title="拖拽排序">⋮⋮</button>
          <input class="tier-name" />
          <input class="tier-color" type="color" />
          <button class="delete-tier" title="删除">✕</button>
        </div>
        <div class="tier-dropzone"></div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
