name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build portable exe
        run: npm run dist:win

      - name: Upload win artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-portable
          path: release/Tier-List-Pro-Portable.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build dmg
        run: npm run dist:mac

      - name: Upload mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: release/Tier-List-Pro-macOS.dmg

  release:
    runs-on: ubuntu-latest
    needs: [build-win, build-mac]
    steps:
      - name: Download win artifact
        uses: actions/download-artifact@v4
        with:
          name: win-portable
          path: release

      - name: Download mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: release

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/Tier-List-Pro-Portable.exe
            release/Tier-List-Pro-macOS.dmg
