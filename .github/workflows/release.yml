name: Portable EXE Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build portable exe
        run: npm run dist:win

      - name: Publish latest release with exe
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          artifactErrorsFailBuild: true
          artifacts: release/Tier-List-Pro-Portable.exe
          body: |
            Auto-updated Windows portable build.
            File: Tier-List-Pro-Portable.exe
