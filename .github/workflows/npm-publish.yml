name: Node.js Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build portable exe
        run: npx electron-builder --win portable --config.win.artifactName=Tier-List-Pro-Portable.exe

      - name: Verify exe exists
        shell: bash
        run: test -f release/Tier-List-Pro-Portable.exe

      - name: Publish latest release with exe
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build
          allowUpdates: true
          removeArtifacts: false
          artifactErrorsFailBuild: true
          artifacts: release/Tier-List-Pro-Portable.exe

  publish-npm:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ false }}
    steps:
      - run: echo "disabled"
